name: Deploy to Firebase

# Este workflow se dispara cuando se hace push a main (o merge de un PR).
# Requiere approval manual del environment "production" antes de ejecutar.
# Resultado: cada cambio pasa por 1) PR review + 2) deploy approval,
# ambos controlados por el Owner de la org.
#
# Desplegamos en este orden:
#   1. Firestore rules (deben ir antes que el hosting para que el
#      backend acepte las escrituras que haga el sitio en produccion).
#   2. Hosting (Angular build estatico).

on:
  push:
    branches:
      - main
  workflow_dispatch:
    # Permite disparar el deploy manualmente desde la UI de GitHub
    # si necesitas re-deployar sin un nuevo commit.

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        # Usamos npm install en vez de npm ci porque el lockfile fue
        # generado con npm 11 (definido en packageManager) y los runners
        # de GitHub vienen con npm 10 por defecto, lo que rompe el
        # parseo. npm install es mas permisivo con estos mismatches.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build Angular app
        run: npm run build -- --configuration production

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules
        # Escribimos el service account a un archivo y apuntamos
        # GOOGLE_APPLICATION_CREDENTIALS ahi para que firebase CLI
        # se autentique sin necesidad de hacer login interactivo.
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          firebase deploy --only firestore:rules --project camiseta-d74e5 --non-interactive
          rm -f /tmp/sa.json
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: camiseta-d74e5
          publicDir: dist/camisetapromo2025/browser