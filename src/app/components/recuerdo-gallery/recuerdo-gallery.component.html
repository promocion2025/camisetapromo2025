<div class="empty-state" *ngIf="(recuerdos || []).length === 0">
  <i class="fas fa-camera-retro"></i>
  <p>No hay recuerdos publicados todavía.</p>
</div>

<div class="memory-grid" *ngIf="(recuerdos || []).length > 0">
  <article class="memory-card" [class.featured]="recuerdo.estado === 'destacado'" *ngFor="let recuerdo of recuerdos">
    <img *ngIf="recuerdo.imagenUrl" [src]="recuerdo.imagenUrl" [alt]="'Foto de ' + recuerdo.nombre">

    <div class="memory-body">
      <div class="memory-meta">
        <strong>{{ recuerdo.nombre }}</strong>
        <span *ngIf="recuerdo.promocion">Prom. {{ recuerdo.promocion }}</span>
        <em *ngIf="admin">{{ recuerdo.estado }}</em>
        <em class="featured-label" *ngIf="!admin && recuerdo.estado === 'destacado'">Destacado</em>
      </div>
      <p>{{ recuerdo.mensaje }}</p>

      <div class="memory-actions" *ngIf="admin">
        <button
          *ngIf="recuerdo.estado !== 'aprobado' && recuerdo.estado !== 'destacado'"
          class="btn btn-small btn-primary"
          type="button"
          (click)="aprobar.emit(recuerdo)">
          <i class="fas fa-check"></i>
          Aprobar
        </button>
        <button
          *ngIf="recuerdo.estado !== 'destacado'"
          class="btn btn-small btn-secondary"
          type="button"
          (click)="destacar.emit(recuerdo)">
          <i class="fas fa-star"></i>
          Destacar
        </button>
        <button
          *ngIf="recuerdo.estado === 'aprobado' || recuerdo.estado === 'destacado'"
          class="btn btn-small btn-secondary"
          type="button"
          (click)="pendiente.emit(recuerdo)">
          <i class="fas fa-clock"></i>
          Pausar
        </button>
        <button class="btn btn-small btn-danger" type="button" (click)="eliminar.emit(recuerdo)">
          <i class="fas fa-trash"></i>
          Eliminar
        </button>
      </div>
    </div>
  </article>
</div>
