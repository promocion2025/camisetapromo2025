<form class="stack" (ngSubmit)="guardar()">
  <label class="field">
    <span>Título</span>
    <input type="text" name="titulo" [(ngModel)]="form.titulo" placeholder="Ceremonia central" required>
  </label>

  <div class="form-row">
    <label class="field">
      <span>Tipo</span>
      <select name="tipo" [(ngModel)]="form.tipo">
        <option *ngFor="let tipo of tipos" [value]="tipo">{{ tipo }}</option>
      </select>
    </label>
    <label class="field">
      <span>Orden</span>
      <input type="number" name="orden" [(ngModel)]="form.orden" min="1">
    </label>
  </div>

  <div class="form-row">
    <label class="field">
      <span>Fecha</span>
      <input type="date" name="fecha" [(ngModel)]="form.fecha" required>
    </label>
    <label class="field">
      <span>Inicio</span>
      <input type="time" name="horaInicio" [(ngModel)]="form.horaInicio" required>
    </label>
  </div>

  <label class="field">
    <span>Fin</span>
    <input type="time" name="horaFin" [(ngModel)]="form.horaFin">
  </label>

  <label class="field">
    <span>Lugar</span>
    <input type="text" name="lugar" [(ngModel)]="form.lugar" required>
  </label>

  <label class="field">
    <span>Descripción</span>
    <textarea name="descripcion" [(ngModel)]="form.descripcion" rows="3"></textarea>
  </label>

  <p class="status success" *ngIf="message">
    <i class="fas fa-check-circle"></i>
    {{ message }}
  </p>

  <p class="status error" *ngIf="error">
    <i class="fas fa-exclamation-circle"></i>
    {{ error }}
  </p>

  <button class="btn btn-primary full" type="submit" [disabled]="isLoading">
    <i class="fas" [class.fa-plus]="!isLoading" [class.fa-spinner]="isLoading" [class.fa-spin]="isLoading"></i>
    {{ isLoading ? 'Guardando' : 'Agregar actividad' }}
  </button>
</form>
